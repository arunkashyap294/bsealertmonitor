# ============================================================
# Corporate Announcement Monitor - Configuration
# ============================================================
#py monitor.py              # Start continuous monitoring (every 10 min)
#py monitor.py --run-once   # Scan today's announcements once
#py monitor.py --lookback-hours 36   # Scan yesterday + today


# How often to check for new announcements (in minutes)
# Allowed values: 5, 10, 15, 30, 60
interval_minutes: 10

# ============================================================
# WhatsApp Notification Settings (Twilio)
# ============================================================
whatsapp:
  # Your WhatsApp number in E.164 format (e.g. +919876543210)
  to_number: "+91XXXXXXXXXX"

# ============================================================
# Companies to Monitor
# Each entry needs:
#   name       - Display name of the company
#   scripcode  - BSE scrip code (6-digit number from the URL)
#                Example: for URL ending in /543942/  => scripcode: "543942"
#py monitor.py           # Scheduler (every 10 min, alerts for today)
#py monitor.py --run-once              # Scan today only
#py monitor.py --lookback-hours 36    # Scan yesterday + today
# ============================================================
companies:
 

  # Add more companies below:
  - name: "Edelweiss Financial Services"
    scripcode: "532922"
  #
  - name: "TCS"
    scripcode: "532540"
  #
  # - name: "HDFC Bank"
  #   scripcode: "500180"

# ============================================================
# Summarization Settings
# ============================================================
summarizer:
  # Maximum characters of document text to send to LLM
  max_chars: 8000
  # Summary style prompt instruction
  summary_style: "in 3-5 bullet points, plain English"
